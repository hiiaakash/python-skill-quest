<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Python Skill Quest 🐍</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f23;--card:#1a1a2e;--accent:#00d4ff;--gold:#ffd700;--green:#00ff88;--red:#ff4757;--purple:#a855f7;--orange:#ff6b35;--text:#e2e8f0;--dim:#64748b;--border:#2d2d44}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.container{max-width:520px;margin:0 auto;padding:8px}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card);border-radius:10px;margin-bottom:10px;border:1px solid var(--border)}
.header h1{font-size:16px;background:linear-gradient(90deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:flex;gap:10px;font-size:12px}
.nav{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto}
.nav-btn{padding:7px 12px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:8px;cursor:pointer;font-size:12px;white-space:nowrap;transition:.2s}
.nav-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.card h2{font-size:16px;margin-bottom:6px;color:var(--accent)}
.card h3{font-size:14px;margin-bottom:5px;color:var(--gold)}
.card p{font-size:12px;line-height:1.5;color:var(--dim)}
pre,.codeblock{background:#0d0d1a;padding:10px;border-radius:8px;overflow-x:auto;margin:6px 0;font-family:'Courier New',monospace;font-size:11px;color:var(--green);white-space:pre-wrap;word-wrap:break-word;line-height:1.5}
.btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#000}
.btn-success{background:var(--green);color:#000}
.btn-danger{background:var(--red);color:#fff}
.btn-gold{background:var(--gold);color:#000}
.btn-purple{background:var(--purple);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-full{width:100%;justify-content:center}
.option{padding:11px;background:#12122a;border:2px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:12px;transition:.2s;display:flex;align-items:center;gap:8px}
.option:hover{border-color:var(--accent)}
.option.correct{border-color:var(--green);background:#00ff8815}
.option.wrong{border-color:var(--red);background:#ff475715}
.option .key{background:var(--border);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:4px;margin:6px 0;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s;background:linear-gradient(90deg,var(--accent),var(--green))}
.blank-input{background:#1e1e3a;border:2px solid var(--accent);color:var(--gold);padding:3px 6px;border-radius:4px;font-family:'Courier New',monospace;font-size:12px;width:100px;outline:none}
.blank-input.correct{border-color:var(--green);color:var(--green)}
.blank-input.wrong{border-color:var(--red);color:var(--red)}
.code-line{font-family:'Courier New',monospace;font-size:12px;padding:2px 0;color:var(--green)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;z-index:999;animation:slideD .3s}
.toast-success{background:var(--green);color:#000}.toast-error{background:var(--red);color:#fff}.toast-info{background:var(--gold);color:#000}
@keyframes slideD{from{top:-40px;opacity:0}to{top:16px;opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.4)}50%{box-shadow:0 0 0 8px rgba(255,215,0,0)}}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.stat-card{text-align:center;padding:12px;background:#12122a;border-radius:8px;border:1px solid var(--border)}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:10px;color:var(--dim);margin-top:2px}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:10px 0}
.level-btn{padding:10px 6px;border:2px solid var(--border);background:#12122a;color:var(--text);border-radius:8px;cursor:pointer;text-align:center;font-size:11px;transition:.2s}
.level-btn.unlocked{border-color:var(--accent)}.level-btn.unlocked:hover{background:var(--accent);color:#000}
.level-btn.completed{background:var(--green);color:#000;border-color:var(--green)}
.level-btn.current{border-color:var(--gold);animation:pulse 1.5s infinite}
.level-btn.locked{opacity:.4;cursor:not-allowed}
.level-btn .lv{font-weight:700;font-size:13px}
.level-btn .lt{font-size:8px;margin-top:1px;opacity:.8}
.world-map{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0}
.city-card{padding:12px;background:#12122a;border-radius:8px;text-align:center;border:2px solid var(--border);cursor:pointer;transition:.2s}
.city-card.unlocked{border-color:var(--accent)}.city-card.completed{border-color:var(--green)}.city-card.locked{opacity:.4;cursor:not-allowed}
.city-card .ci{font-size:24px}.city-card .cn{font-size:12px;font-weight:600}.city-card .ct{font-size:10px;color:var(--dim)}
.result{text-align:center;padding:20px 10px}
.result .score{font-size:42px;font-weight:700;margin:8px 0}
.concept-box{background:#0d1a2a;border-left:3px solid var(--accent);padding:10px;border-radius:0 8px 8px 0;margin:6px 0;font-size:12px;line-height:1.6}
.analogy-box{background:#1a0d2a;border-left:3px solid var(--purple);padding:10px;border-radius:0 8px 8px 0;margin:6px 0;font-size:12px;line-height:1.6}
.interview-box{background:#1a2a0d;border-left:3px solid var(--green);padding:10px;border-radius:0 8px 8px 0;margin:6px 0;font-size:12px;line-height:1.6}
.hint-btn{padding:5px 10px;background:var(--gold);color:#000;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600}
.hint-text{background:#2a2a0d;border:1px solid var(--gold);padding:8px;border-radius:8px;font-size:11px;margin:6px 0;color:var(--gold);display:none}
.hint-text.show{display:block}
.ch-item{padding:12px;background:#12122a;border-radius:8px;margin-bottom:6px;cursor:pointer;border:1px solid var(--border);transition:.2s;display:flex;justify-content:space-between;align-items:center}
.ch-item:hover{border-color:var(--accent)}
.ch-item .left{display:flex;align-items:center;gap:8px}
.ch-item .num{background:var(--accent);color:#000;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.ch-item .ti{font-size:13px}
.ch-item .tag{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600}
.search-box{width:100%;padding:10px;background:#12122a;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px}
.search-box:focus{border-color:var(--accent)}
.code-compare{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.code-compare pre{font-size:10px;padding:6px;cursor:pointer;border:2px solid var(--border);border-radius:6px}
.code-compare pre:hover{border-color:var(--accent)}
.code-compare pre.correct{border-color:var(--green)}.code-compare pre.wrong{border-color:var(--red)}
.puzzle-line{padding:8px;background:#12122a;border:1px solid var(--border);border-radius:6px;margin:3px 0;font-family:'Courier New',monospace;font-size:11px;cursor:grab;user-select:none;touch-action:none}
.puzzle-line.dragging{opacity:.5}.puzzle-line.correct-pos{border-color:var(--green)}.puzzle-line.wrong-pos{border-color:var(--red)}
.badge-list{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.badge-item{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600}
.part-header{background:linear-gradient(135deg,#1a1a3e,#2a1a3e);padding:14px;border-radius:10px;margin:10px 0;border-left:4px solid var(--accent)}
.part-header h2{font-size:15px;color:var(--accent);margin-bottom:4px}
.part-header p{font-size:11px;color:var(--dim)}
@media(max-width:400px){.container{padding:5px}.card{padding:10px}.code-compare{grid-template-columns:1fr}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>

      content: `<div class="analogy-box">💡 <b>ANALOGY:</b> Python = Calculator + Notebook + Assistant. Variables = labelled boxes. Data types = box ka material (plastic/glass/steel).</div>

<b>Variables & Data Types:</b>
<pre># Variable = labelled box jismein data rakho
name = "GEEP"        # str - text (quotes mein)
age = 25              # int - whole number (bina decimal)
price = 99.5          # float - decimal number
is_active = True      # bool - True/False (capital T/F!)
items = [1, 2, 3]     # list - ordered, changeable, [] brackets
info = {"name": "GPI"} # dict - key:value pairs, {} brackets
coords = (10, 20)     # tuple - ordered, NOT changeable, () brackets
unique = {1, 2, 3}    # set - unique values only, {} brackets

# TYPE CHECK kaise karo:
print(type(name))     # &lt;class 'str'&gt;
print(type(age))      # &lt;class 'int'&gt;

# KYUN important: Python DYNAMICALLY typed hai
# x = 5 phir x = "hello" — ALLOWED (type change!)
# But production mein type hints use karo for clarity</pre>

<b>Print & f-string (HAMESHA yeh use karo):</b>
<pre>print(f"Name: {name}, Age: {age}")  # f-string = BEST way
# f lagao string ke pehle, {} mein variable daalo
# PURANA tarika (mat use karo):
# print("Name: " + name + " Age: " + str(age))  # Mushkil!

user = input("Enter name: ")  # User se input lo
# input() HAMESHA string return karta hai
# Number chahiye? int(input("Age: "))</pre>

<b>Type Conversion:</b>
<pre>x = int("42")      # str → int (number bana do)
y = float("3.14")  # str → float
z = str(100)       # int → str (text bana do)
a = list("abc")    # str → list = ['a','b','c']
b = bool(0)        # int → bool = False (0=False, rest=True)

# COMMON MISTAKE:
# int("hello")  → ValueError! (text ko number nahi bana sakte)
# HAMESHA try/except use karo production mein</pre>

<b>String Methods (YAAD KARO):</b>
<pre>s = "Hello World"
s.upper()           # "HELLO WORLD"
s.lower()           # "hello world"
s.strip()           # Spaces remove from both sides
s.split(" ")        # ["Hello", "World"] — list bana do
s.replace("Hello", "Hi")  # "Hi World"
len(s)              # 11 (length of string)
"Hello" in s        # True (check if exists)
s.startswith("He")  # True
s.endswith("ld")    # True
s[0]                # "H" (first character, index 0 se start!)
s[-1]               # "d" (last character)
s[0:5]              # "Hello" (slicing: start to end-1)</pre>

<b>Operators:</b>
<pre># Arithmetic: + - * / // % **
10 / 3   # 3.333 (normal divide)
10 // 3  # 3 (floor divide — integer result)
10 % 3   # 1 (remainder — modulo)
2 ** 3   # 8 (power — 2 ki power 3)

# Comparison: == != > < >= <=
5 == 5   # True
5 != 3   # True

# Logical: and, or, not
True and False  # False
True or False   # True
not True        # False</pre>

<div class="interview-box">🎤 <b>INTERVIEW:</b><br>
Q: Python mein mutable vs immutable kya hai?<br>
A: Mutable = change ho sakta (list, dict, set). Immutable = change NAHI (str, tuple, int, float).<br><br>
Q: f-string kya hai?<br>
A: f"Hello {name}" — formatted string literal. Python 3.6+. Best way to format strings.</div>`
    },
    {
      num: 2, title: "Control Flow (if/for/while)",
      content: `<div class="analogy-box">💡 <b>ANALOGY:</b> if-else = Traffic signal (red=stop, green=go). for loop = Assembly line (har item pe kaam karo). while loop = Watchman (jab tak condition true, kaam karo).</div>

<b>If-Elif-Else (Decision Making):</b>
<pre># KYUN: Program ko decisions lena sikhao
age = 20
if age >= 18:          # Condition check
    print("Adult")     # True toh yeh
elif age >= 13:        # Pehla false toh yeh check
    print("Teen")
else:                  # Sab false toh yeh
    print("Child")

# TERNARY (One-line if):
status = "Adult" if age >= 18 else "Minor"
# Use kab: Simple conditions jo ek line mein fit ho

# NESTED if (avoid karo agar ho sake):
if age >= 18:
    if age >= 65:
        print("Senior")
    else:
        print("Adult")

# MULTIPLE CONDITIONS:
if age >= 18 and age < 65:   # AND — dono true chahiye
    print("Working age")
if age < 13 or age > 65:     # OR — ek bhi true
    print("Dependent")</pre>

<b>For Loop (Collection pe iterate):</b>
<pre># KYUN: List/string/dict ke har element pe kaam karo
for item in [1, 2, 3]:      # List pe loop
    print(item)               # 1, 2, 3

for char in "GEEP":          # String pe loop
    print(char)               # G, E, E, P

# range() — number sequence generate
for i in range(5):            # 0,1,2,3,4 (0 se start, 5 tak nahi)
    print(i)

for i in range(1, 6):        # 1,2,3,4,5 (1 se 5 tak)
    print(i)

for i in range(0, 10, 2):    # 0,2,4,6,8 (step=2)
    print(i)

# enumerate() — index + value DONO chahiye
fruits = ["apple", "banana", "cherry"]
for idx, fruit in enumerate(fruits):
    print(f"{idx}: {fruit}")   # 0:apple, 1:banana, 2:cherry

# zip() — 2 lists saath mein
names = ["GEEP", "Ali"]
ages = [25, 30]
for name, age in zip(names, ages):
    print(f"{name} is {age}")  # GEEP is 25, Ali is 30</pre>

<b>While Loop (Condition based):</b>
<pre># KYUN: Jab tak condition true, chalta raho
count = 0
while count < 5:       # Jab tak count < 5
    print(count)        # 0,1,2,3,4
    count += 1          # IMPORTANT: increment karo warna infinite loop!

# break = RUKO (loop se bahar)
# continue = SKIP (agle iteration pe jao)
for i in range(10):
    if i == 3: continue  # 3 skip
    if i == 7: break     # 7 pe ruk jao
    print(i)             # 0,1,2,4,5,6</pre>

<b>Comprehensions (Ek line mein loop):</b>
<pre># List comprehension — BAHUT IMPORTANT
squares = [x**2 for x in range(5)]     # [0,1,4,9,16]
evens = [x for x in range(10) if x%2==0]  # [0,2,4,6,8]

# Dict comprehension
sq_dict = {x: x**2 for x in range(5)}  # {0:0, 1:1, 2:4, 3:9, 4:16}

# Set comprehension
lengths = {len(w) for w in ["hi","hello","hey"]}  # {2,3,5}

# KYUN use kare: Chhota code, fast execution, Pythonic way
# Interview mein comprehension likhoge toh impression achha</pre>

<div class="interview-box">🎤 <b>INTERVIEW:</b><br>
Q: for vs while kab use kare?<br>
A: for = jab pata hai kitni baar (list, range). while = jab condition-based (user input tak).<br><br>
Q: List comprehension vs regular loop?<br>
A: Comprehension faster + cleaner. But complex logic mein regular loop readable.<br><br>
Q: range(5) mein 5 include nahi kyun?<br>
A: Python convention — end exclusive. range(0,5) = 0,1,2,3,4.</div>`
    },
    {
      num: 3, title: "Functions",
      content: `<div class="analogy-box">💡 <b>ANALOGY:</b> Function = Vending Machine. Input daalo (coins + selection), output aaye (snack). Machine ke ANDAR kya ho raha hai — tumhe pata nahi chahiye (abstraction). Same machine baar baar use kar sakte ho (reusability).</div>

<b>Basic Function:</b>
<pre># KYUN functions: Code reuse. Baar baar same code mat likho.
def greet(name):
    """This function greets someone"""  # Docstring (documentation)
    # name = parameter (placeholder)
    return f"Hello {name}!"
    # return = function ka output
    # BINA return ke function None return karta hai

result = greet("GEEP")  # "GEEP" = argument (actual value)
print(result)            # "Hello GEEP!"

# RULE: Function ek KAAM kare. "Do one thing well."</pre>

<b>Default & Keyword Arguments:</b>
<pre>def create_user(name, age=25, city="Delhi"):
    # age=25 = default value (nahi diya toh 25)
    return {"name": name, "age": age, "city": city}

create_user("GEEP")                    # age=25, city=Delhi (defaults)
create_user("GEEP", 30)               # age=30, city=Delhi
create_user("GEEP", city="Mumbai")    # age=25, city=Mumbai (keyword arg)

# RULE: Required args PEHLE, default args BAAD mein
# def func(required, optional=default) ✅
# def func(optional=default, required) ❌ ERROR!</pre>

<b>*args & **kwargs (INTERVIEW FAVOURITE):</b>
<pre>def add_all(*args):
    # *args = SAARE extra positional arguments
    # args = TUPLE = (1, 2, 3, 4)
    print(type(args))  # &lt;class 'tuple'&gt;
    return sum(args)

add_all(1, 2, 3, 4)  # 10

def print_info(**kwargs):
    # **kwargs = SAARE extra keyword arguments
    # kwargs = DICT = {"name": "GEEP", "age": 25}
    print(type(kwargs))  # &lt;class 'dict'&gt;
    for key, val in kwargs.items():
        print(f"{key}: {val}")

print_info(name="GEEP", age=25, city="Delhi")

# DONO saath mein (ORDER zaroori!):
def flexible(a, b, *args, **kwargs):
    print(f"a={a}, b={b}")   # Required
    print(f"args={args}")     # Extra positional
    print(f"kwargs={kwargs}") # Extra keyword

# UNPACKING:
data = {"name": "GEEP", "age": 25}
greet(**data)  # = greet(name="GEEP", age=25)

nums = [1, 2, 3]
print(*nums)   # = print(1, 2, 3)</pre>

<b>Lambda (Anonymous Function):</b>
<pre># Lambda = 1-line function (naam nahi chahiye)
square = lambda x: x ** 2
add = lambda a, b: a + b

# map = har element pe function lagao
nums = [1, 2, 3, 4, 5]
doubled = list(map(lambda x: x*2, nums))      # [2,4,6,8,10]

# filter = condition pass kare woh rakho
evens = list(filter(lambda x: x%2==0, nums))   # [2,4]

# reduce = sab combine karke ek banao
from functools import reduce
total = reduce(lambda a,b: a+b, nums)  # 15

# Sorting with lambda (BAHUT USEFUL):
students = [("GEEP",90),("Ali",85),("Raj",95)]
sorted(students, key=lambda x: x[1], reverse=True)
# [("Raj",95), ("GEEP",90), ("Ali",85)]</pre>

<b>Scope (LEGB Rule):</b>
<pre># L = Local (function ke andar)
# E = Enclosing (outer function — closures)
# G = Global (file level)
# B = Built-in (Python built-in like print, len)
# Python ISME order mein dhundhta hai variable</pre>

<div class="interview-box">🎤 <b>INTERVIEW:</b><br>
Q: *args vs **kwargs?<br>
A: *args = tuple of positional. **kwargs = dict of keyword. Order: (a, b, *args, **kwargs).<br><br>
Q: Lambda kab use kare?<br>
A: Simple 1-line functions. map/filter/sort ke saath. Complex logic mein regular def use karo.<br><br>
Q: Pass by reference ya value?<br>
A: Python = pass by object reference. Mutable objects (list/dict) change hote hain, immutable (int/str) nahi.</div>`
    },
    {
      num: 4, title: "Data Structures (List/Dict/Set/Tuple)",
      content: `<div class="analogy-box">💡 <b>ANALOGY:</b> List = Shopping list (ordered, change kar sakte ho). Dict = Phone book (naam se number dhundho). Set = Unique stamps collection (duplicate nahi). Tuple = Aadhaar number (change NAHI hota).</div>

<b>Lists (SABSE ZYADA USE):</b>
<pre>lst = [1, 2, 3, 4, 5]
lst.append(6)          # End mein add [1,2,3,4,5,6]
lst.insert(0, 0)       # Index 0 pe add [0,1,2,3,4,5,6]
lst.pop()              # Last remove + return
lst.pop(0)             # Index 0 remove
lst.remove(3)          # Value 3 hatao (pehla match)
lst.sort()             # Ascending sort
lst.sort(reverse=True) # Descending sort
lst.reverse()          # Ulta karo
len(lst)               # Length

# SLICING (bahut important):
lst[1:3]    # Index 1 to 2 (3 nahi!)
lst[:3]     # Start to 2
lst[2:]     # Index 2 to end
lst[-1]     # Last element
lst[-3:]    # Last 3 elements
lst[::2]    # Har doosra element (step=2)
lst[::-1]   # REVERSE (one-line trick!)

# COPY (IMPORTANT!):
a = [1,2,3]
b = a        # b = SAME list (reference copy!)
b.append(4)  # a bhi change hoga! [1,2,3,4]
c = a.copy() # c = NEW list (independent copy)
c.append(5)  # a change NAHI hoga</pre>

<b>Dictionaries (Key-Value Store):</b>
<pre>d = {"name": "GEEP", "age": 25}
d["city"] = "Alwar"        # Add/update key
d.get("phone", "N/A")      # Safe access (default if missing)
# d["phone"] → KeyError! d.get("phone") → None

d.keys()    # dict_keys(['name','age','city'])
d.values()  # dict_values(['GEEP', 25, 'Alwar'])
d.items()   # [(name,GEEP), (age,25), (city,Alwar)]
d.pop("age")               # Remove + return value
d.update({"email": "a@b.com"})  # Merge another dict

# LOOP:
for key, val in d.items():
    print(f"{key}: {val}")

# NESTED dict (JSON jaisa):
company = {
    "name": "GPI",

<pre># 1. HASH MAP — Two Sum
def two_sum(nums, target):
    seen = {}
    for i, num in enumerate(nums):
        comp = target - num
        if comp in seen: return [seen[comp], i]
        seen[num] = i

# 2. TWO POINTERS — Palindrome
def is_palindrome(s):
    l, r = 0, len(s)-1
    while l < r:
        if s[l] != s[r]: return False
        l += 1; r -= 1
    return True

# 3. STACK — Valid Parentheses
def is_valid(s):
    stack, m = [], {')':'(','}':'{',']':'['}
    for c in s:
        if c in m:
            if not stack or stack[-1]!=m[c]: return False
            stack.pop()
        else: stack.append(c)
    return not stack

# 4. DP — Climbing Stairs (Fibonacci)
def climb(n):
    if n<=2: return n
    a,b = 2,1
    for i in range(3,n+1): a,b = a+b,a
    return a

# 5. BINARY SEARCH
def bs(nums, target):
    l,r = 0, len(nums)-1
    while l<=r:
        m = (l+r)//2
        if nums[m]==target: return m
        elif nums[m]<target: l=m+1
        else: r=m-1
    return -1</pre>`},

{q:"Supervised vs Unsupervised vs Reinforcement?", a:"Supervised: Input + correct answer dono dete hain (spam detection). Unsupervised: Sirf input, model khud groups banata hai (customer segments). Reinforcement: Trial-error, reward/penalty se seekhta hai (game AI, ChatGPT RLHF)."},
{q:"Overfitting kya hai? 5 fixes?", a:"Train accuracy 99% but test 70% = RATTA. Fixes: 1) More data 2) Simpler model 3) Regularization (L1/L2) 4) Cross-validation 5) Dropout (neural nets). Detect: train vs test gap bada = overfitting."},
{q:"Precision vs Recall?", a:"Precision = predicted positive mein kitne sahi (spam filter — important miss na ho). Recall = actual positive mein kitne dhundhe (cancer — koi miss na ho). F1 = dono ka balance."},
{q:"RAG kya hai? 6 steps?", a:"Open book exam. 1) Load docs 2) Split chunks 3) Embed (text→numbers) 4) Store vector DB 5) Retrieve relevant 6) Generate answer. Hallucination kam, accurate answers."},
{q:"Fine-tuning vs RAG?", a:"RAG = external data access, fast iterate. Fine-tune = model behavior change, better quality. Rule: PEHLE RAG try. Fail toh fine-tune. Best = both combine."},
{q:"Transformer architecture?", a:"2017 Google 'Attention Is All You Need'. Self-attention = har word poore sentence ke context mein. Encoder (BERT) + Decoder (GPT). Sab modern LLMs transformer-based."},
{q:"Gradient Descent?", a:"Model predict → error calculate → thoda adjust → repeat. Pahaad se neeche utarna analogy. Learning rate = step size. Adam = popular optimizer."},
{q:"Cross-validation kaise?", a:"Data K parts mein baato (K=5). 5 baar train/test, har baar alag part test. Average = reliable score. Single split mein luck factor."},
{q:"Data Leakage?", a:"Model ko cheating info mil jaaye. Common: StandardScaler test pe bhi FIT karna. Rule: fit_transform SIRF TRAIN. transform SIRF TEST. HAMESHA."},
{q:"LangChain chain?", a:"pipe operator: chain = prompt | llm | parser. invoke() se run. Model switch = sirf 1 line change. Yahi power hai."},
{q:"Vector database?", a:"Normal DB = exact match. Vector DB = similar search (semantic). Text → numbers (embedding) → similar = close vectors. FAISS(proto), ChromaDB(small), Pinecone(enterprise)."},
{q:"Embedding?", a:"Text → numbers list. 'Python programming' → [0.023, -0.156...]. Similar meaning = similar numbers. Cosine similarity se measure. Use: RAG, recommendations."},
{q:"Prompt injection se bachao?", a:"7 layers: Input sanitize, PII mask, system prompt harden, output filter, rate limit, API key auth, audit log. Regex se dangerous phrases detect+block."},
{q:"Docker?", a:"App ko portable box mein pack. Image=blueprint, Container=running instance. build→run→ps→logs→stop. docker-compose = multiple services. MNC mandatory."},
{q:"Feature engineering?", a:"Raw data se useful features nikalna. Date→day_of_week. Address→city. Text→word_count. Good features = good model. ML ka 80%."},
{q:"Regularization (L1/L2)?", a:"Overfitting rokna. L1(Lasso) = kuch weights ZERO (feature selection). L2(Ridge) = weights chhote (all features keep). Elastic Net = dono combine."},
{q:"Random Forest?", a:"Multiple Decision Trees ka group. Har tree alag random data pe train. Prediction = majority vote. n_estimators=100-200. Bagging technique."},
{q:"System design chatbot 10K users?", a:"5 steps: Clarify→Architecture(4 layers)→Deep dive(model routing+cache+RAG)→Trade-offs→Scale. Redis cache, load balancer, async processing."},
{q:"Challenging project?", a:"STAR: ERPNext mein BOM items auto-populate nahi ho rahe. Debug kiya—async issue tha. Custom function likhi. Production deploy, manual entry 100% eliminate."},
{q:"Rate limiting?", a:"Dict mein {user_id: [timestamps]}. Request aaye → purane remove → count check → limit ke andar? Allow. Nahi? 429 error. Production: Redis + sliding window."}

    {heading:"💡 ANALOGY (Real Life Samjho)",type:"analogy",content:`<b>Gift Wrapping:</b> Plain box hai (function). Gift wrap karo, ribbon lagao (decorator). Box WAHI hai, presentation badal gaya.

    {heading:"📖 CONCEPT (Deep Samjho)",type:"concept",content:`<b>Decorator = function jo doosre function ko input le, modify kare, return kare.</b>

<b>3 PARTS hamesha:</b>
1. <b>Outer function</b> (decorator) — func receive karta hai
2. <b>Inner function</b> (wrapper) — actual kaam yahan
3. <b>Return wrapper</b> — modified version de do

<b>KYUN?</b> Same code baar baar avoid (DRY principle)
→ Logging? @logger. Timing? @timer. Auth? @auth.

    {heading:"🔥 SIMPLE CODE (Pehle yeh samjho)",type:"concept",content:`<pre># SABSE SIMPLE DECORATOR — Har line ka matlab

def my_decorator(func):
    # func = woh function jo decorate karna hai
    
    def wrapper():
        # Yeh INNER function hai
        # Jab say_hello() call hoga, ACTUALLY yeh chalega
        print("Before")   # Pehle yeh
        func()             # Phir ORIGINAL
        print("After")    # Phir yeh
    
    return wrapper
    # wrapper FUNCTION return, wrapper() CALL nahi!
    # return wrapper = SAHI ✅
    # return wrapper() = GALAT ❌ (immediately execute)

@my_decorator
def say_hello():
    print("Hello GEEP!")

say_hello()
# Output:
# Before
# Hello GEEP!
# After</pre>`},
    {heading:"⚡ WITH ARGUMENTS (*args, **kwargs)",type:"concept",content:`<pre>def my_decorator(func):
    def wrapper(*args, **kwargs):
        # *args = SAARE positional → tuple
        #   add(5, 3) → args = (5, 3)
        # **kwargs = SAARE keyword → dict
        #   greet(name="GEEP") → kwargs = {"name": "GEEP"}
        
        print(f"Calling {func.__name__}")
        result = func(*args, **kwargs)  # Same args pass
        print(f"Result: {result}")
        return result  # BHOOLNA MAT!
    return wrapper

@my_decorator
def add(a, b):
    return a + b

add(5, 3)
# Calling add
# Result: 8</pre>

<b>YAAD RAKHO:</b>
→ *args = tuple (positional)
→ **kwargs = dict (keyword)
→ DONO likho = ANY function handle
→ result return ZARURI hai`},
    {heading:"🛠️ REAL WORLD (Production Use)",type:"concept",content:`<b>@timer:</b> Function kitna time le raha? Performance check.
<pre>import time
def timer(func):
    def wrapper(*args, **kwargs):
        start = time.time()
        result = func(*args, **kwargs)
        print(f"{func.__name__}: {time.time()-start:.4f}s")
        return result
    return wrapper</pre>

<b>@retry:</b> API fail toh 3 baar try karo.
<pre>def retry(max=3):
    def decorator(func):
        def wrapper(*args, **kwargs):
            for i in range(1, max+1):
                try: return func(*args, **kwargs)
                except Exception as e:
                    if i == max: raise
                    time.sleep(1)
        return wrapper
    return decorator</pre>

<b>@cache:</b> Same input ka result yaad rakho.
<pre>def cache(func):
    saved = {}
    def wrapper(*args):
        if args in saved: return saved[args]
        result = func(*args)
        saved[args] = result
        return result
    return wrapper</pre>

<b>@logger:</b> Kaun kya call kar raha? Debugging/monitoring.
<b>@validate:</b> Input check karo before function run.
<b>@auth:</b> User authorized hai? Check karo.

<b>Q: Multiple decorators order?</b>
A: Bottom to top. @bold @italic = italic pehle, bold baad.

<b>Q: return wrapper vs return wrapper()?</b>
A: wrapper = function object SAHI ✅. wrapper() = immediate call GALAT ❌.

<b>Q: Real uses?</b>

def count_up(n):
    i = 1
    while i <= n:
        yield i    # Ek value do, RUKO

        i += 1

for num in count_up(5):
    print(num)  # 1, 2, 3, 4, 5

# MANUAL next()

    while True:

  const app=document.getElementById('app'),q=gameState.qs[gameState.cur];
  if(!q){endGame();return}
  app.innerHTML+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="color:var(--red);font-size:16px">${'❤️'.repeat(gameState.lives)}${'🖤'.repeat(3-gameState.lives)}</div><div style="color:var(--dim);font-size:12px">${gameState.cur+1}/${gameState.total}</div><div style="color:var(--gold)">⭐${gameState.score}</div></div>`;
  app.innerHTML+=`<div class="progress-bar"><div class="progress-fill" style="width:${(gameState.cur/gameState.total)*100}%"></div></div>`;
  const fn={mcq:rMCQ,truefalse:rTF,fillblanks:rFB,predict:rPredict,matchpairs:rMatch,detective:rDet,puzzle:rPuzzle,debug:rDebug,speed:rSpeed,boss:rBoss}[gameState.type];
  if(fn)fn(q);
}

function hintBtn(h){const id='h'+Math.random().toString(36).substr(2,5);return`<div style="margin:6px 0"><button class="hint-btn" onclick="document.getElementById('${id}').classList.toggle('show');gameState.score=Math.max(0,gameState.score-5);toast('-5 Hint','info')">💡 Hint (-5)</button></div><div class="hint-text" id="${id}">💡 ${h}</div>`}

function rMCQ(q){const app=document.getElementById('app');let h=`<div class="card"><h3>🎯 ${q.q}</h3></div>`;q.options.forEach((o,i)=>{h+=`<div class="option" onclick="chkMCQ(${i},${q.answer})"><span class="key">${'ABCD'[i]}</span>${esc(o)}</div>`});h+=hintBtn(q.hint);app.innerHTML+=h}
function rTF(q){const app=document.getElementById('app');app.innerHTML+=`<div class="card"><h3>✅ True or False?</h3><p style="font-size:13px;color:var(--text);margin-top:6px">${q.q}</p></div><div class="option" onclick="chkTF(true,${q.answer})"><span class="key" style="background:var(--green);color:#000">T</span>TRUE</div><div class="option" onclick="chkTF(false,${q.answer})"><span class="key" style="background:var(--red)">F</span>FALSE</div>${hintBtn(q.hint)}`}
function rPredict(q){const app=document.getElementById('app');let h=`<div class="card"><h3>🔮 Predict Output</h3><pre>${esc(q.code)}</pre></div>`;q.options.forEach((o,i)=>{h+=`<div class="option" onclick="chkMCQ(${i},${q.answer})"><span class="key">${'ABCD'[i]}</span><code>${esc(o)}</code></div>`});h+=hintBtn(q.hint);app.innerHTML+=h}
function rFB(q){const app=document.getElementById('app');let bi=0,h='<div class="card"><h3>📝 Fill Blanks</h3><div style="margin-top:8px">';q.code.split('\n').forEach(l=>{if(l.includes('___')){h+='<div class="code-line">';l.split('___').forEach((p,i)=>{h+=esc(p);if(i<l.split('___').length-1){h+=`<input class="blank-input" id="b${bi}" data-a="${q.blanks[bi]}" placeholder="?">`;bi++}});h+='</div>'}else{h+=`<div class="code-line">${esc(l)}</div>`}});h+=`</div><br><button class="btn btn-primary btn-full" onclick="chkFB()">Check ✓</button></div>${hintBtn(q.hint)}`;app.innerHTML+=h}

function rMatch(q){const app=document.getElementById('app'),sr=shuffleArr([...q.pairs.map(p=>p.right)]);let h=`<div class="card"><h3>🔗 Match Pairs</h3><p style="font-size:11px;color:var(--dim)">Tap left then right</p></div><div class="card">`;q.pairs.forEach((p,i)=>{h+=`<div style="display:flex;gap:6px;margin:4px 0"><div class="option" style="flex:1;margin:0;font-size:11px" id="ml${i}" onclick="selML(${i})">${esc(p.left)}</div><div class="option" style="flex:1;margin:0;font-size:11px" id="mr${i}" onclick="selMR(${i})">${esc(sr[i])}</div></div>`});h+='</div>'+hintBtn(q.hint);app.innerHTML+=h;window._ms={l:null,r:null,m:[],sr:sr}}
function selML(i){document.querySelectorAll('[id^=ml]').forEach(e=>e.style.borderColor='var(--border)');document.getElementById(`ml${i}`).style.borderColor='var(--accent)';window._ms.l=i;tryM()}
function selMR(i){document.querySelectorAll('[id^=mr]').forEach(e=>e.style.borderColor='var(--border)');document.getElementById(`mr${i}`).style.borderColor='var(--accent)';window._ms.r=i;tryM()}
function tryM(){const ms=window._ms;if(ms.l!==null&&ms.r!==null){const q=gameState.qs[gameState.cur];if(q.pairs[ms.l].right===ms.sr[ms.r]){document.getElementById(`ml${ms.l}`).style.borderColor='var(--green)';document.getElementById(`mr${ms.r}`).style.borderColor='var(--green)';ms.m.push(ms.l);toast('+5','success');if(ms.m.length===q.pairs.length){gameState.score+=20;setTimeout(()=>nextQ(),800)}}else{document.getElementById(`ml${ms.l}`).style.borderColor='var(--red)';document.getElementById(`mr${ms.r}`).style.borderColor='var(--red)';setTimeout(()=>{document.getElementById(`ml${ms.l}`).style.borderColor='var(--border)';document.getElementById(`mr${ms.r}`).style.borderColor='var(--border)'},500)}ms.l=null;ms.r=null}}

function rDet(q){const app=document.getElementById('app');app.innerHTML+=`<div class="card"><h3>🔍 Which code is CORRECT?</h3></div><div class="code-compare"><pre id="dA" onclick="chkDet('A','${q.correct}')">${esc('A:\n'+q.codeA)}</pre><pre id="dB" onclick="chkDet('B','${q.correct}')">${esc('B:\n'+q.codeB)}</pre></div>${hintBtn(q.hint)}`}
function chkDet(s,c){document.getElementById(`d${s}`).classList.add(s===c?'correct':'wrong');document.getElementById(`d${s==='A'?'B':'A'}`).classList.add(s===c?'wrong':'correct');if(s===c){gameState.score+=25;toast('+25','success')}else{gameState.lives--;toast('Wrong!','error')}setTimeout(()=>nextQ(),1200)}

function rPuzzle(q){const app=document.getElementById('app'),sh=shuffleArr([...q.lines]);let h=`<div class="card"><h3>🧩 ${q.title}</h3></div><div class="card" id="pc">`;sh.forEach((l,i)=>{h+=`<div class="puzzle-line" draggable="true" data-i="${i}" ontouchstart="tds(event)" ontouchmove="tdm(event)" ontouchend="tde(event)" ondragstart="ds(event)" ondragover="event.preventDefault()" ondrop="dl(event)">${esc(l)}</div>`});h+=`<br><button class="btn btn-primary btn-full" onclick="chkPz()">Check ✓</button></div>${hintBtn(q.hint)}`;app.innerHTML+=h;window._pc=q.lines}
let _de=null;function ds(e){_de=e.target;e.target.classList.add('dragging')}function dl(e){e.preventDefault();if(_de&&e.target.classList.contains('puzzle-line')){const c=document.getElementById('pc'),ch=[...c.querySelectorAll('.puzzle-line')],f=ch.indexOf(_de),t=ch.indexOf(e.target);f<t?e.target.after(_de):e.target.before(_de);_de.classList.remove('dragging');_de=null}}
let _te=null;function tds(e){_te=e.target.closest('.puzzle-line');if(_te)_te.classList.add('dragging')}function tdm(e){e.preventDefault();if(!_te)return;const t=e.touches[0],el=document.elementFromPoint(t.clientX,t.clientY);if(el&&el.classList.contains('puzzle-line')&&el!==_te){const c=document.getElementById('pc'),ch=[...c.querySelectorAll('.puzzle-line')],f=ch.indexOf(_te),t2=ch.indexOf(el);f<t2?el.after(_te):el.before(_te)}}function tde(){if(_te)_te.classList.remove('dragging');_te=null}
function chkPz(){const c=document.getElementById('pc'),ls=[...c.querySelectorAll('.puzzle-line')],cor=window._pc;let ok=true;ls.forEach((e,i)=>{const t=e.textContent.trim();t===cor[i].trim()?e.classList.add('correct-pos'):(e.classList.add('wrong-pos'),ok=false)});if(ok){gameState.score+=30;toast('+30 Perfect!','success');setTimeout(()=>nextQ(),1000)}else{gameState.lives--;toast('Wrong order!','error');setTimeout(()=>ls.forEach(e=>e.classList.remove('correct-pos','wrong-pos')),1500);if(gameState.lives<=0)setTimeout(endGame,500)}}

function rDebug(q){const app=document.getElementById('app');let h=`<div class="card"><h3>🐛 Find the Bug</h3><pre>${esc(q.buggy)}</pre></div><div class="card"><h3>Fix?</h3>`;q.options.forEach((o,i)=>{h+=`<div class="option" onclick="chkMCQ(${i},${q.answer})"><span class="key">${'ABCD'[i]}</span>${esc(o)}</div>`});h+='</div>'+hintBtn(q.hint);app.innerHTML+=h}

function rSpeed(q){const app=document.getElementById('app');if(!gameState.timer){gameState.timeLeft=gameState.tpq;gameState.timer=setInterval(()=>{gameState.timeLeft--;const t=document.getElementById('st');if(t)t.textContent=`⏱️${gameState.timeLeft}s`;if(gameState.timeLeft<=0){clearInterval(gameState.timer);gameState.timer=null;gameState.lives--;toast('Time up!','error');if(gameState.lives<=0){endGame();return}nextQ()}},1000)}
let h=`<div class="card"><div style="display:flex;justify-content:space-between"><h3>⚡ Speed</h3><span id="st" style="color:var(--gold);font-weight:700">⏱️${gameState.timeLeft}s</span></div><p style="margin-top:6px;font-size:13px;color:var(--text)">${q.q}</p></div>`;q.options.forEach((o,i)=>{h+=`<div class="option" onclick="chkSpd(${i},${q.answer})"><span class="key">${'ABCD'[i]}</span>${esc(o)}</div>`});app.innerHTML+=h}
function chkSpd(s,c){clearInterval(gameState.timer);gameState.timer=null;if(s===c){const b=Math.max(5,gameState.timeLeft);gameState.score+=15+b;state.totalCorrect++;toast(`+${15+b} Speed!`,'success')}else{gameState.lives--;toast('Wrong!','error')}state.totalAttempted++;if(gameState.lives<=0){endGame();return}gameState.cur++;if(gameState.cur>=gameState.total){endGame();return}gameState.timer=null;render()}

function rBoss(q){const app=document.getElementById('app');app.innerHTML+=`<div class="card" style="border-color:var(--red)"><h3>👹 BOSS Q${gameState.cur+1}/${gameState.total}</h3></div>`;const t=q.type||gameState.type;if(t==='mcq'||t==='debug_mcq'){let h=`<div class="card"><h3>${q.q}</h3>${q.code?`<pre>${esc(q.code)}</pre>`:''}</div>`;q.options.forEach((o,i)=>{h+=`<div class="option" onclick="chkMCQ(${i},${q.answer})"><span class="key">${'ABCD'[i]}</span>${esc(o)}</div>`});app.innerHTML+=h}else if(t==='predict'){let h=`<div class="card"><h3>🔮 Predict</h3><pre>${esc(q.code)}</pre></div>`;q.options.forEach((o,i)=>{h+=`<div class="option" onclick="chkMCQ(${i},${q.answer})"><span class="key">${'ABCD'[i]}</span><code>${esc(o)}</code></div>`});app.innerHTML+=h}else if(t==='truefalse'){app.innerHTML+=`<div class="card"><p style="font-size:13px;color:var(--text)">${q.q}</p></div><div class="option" onclick="chkTF(true,${q.answer})"><span class="key" style="background:var(--green);color:#000">T</span>TRUE</div><div class="option" onclick="chkTF(false,${q.answer})"><span class="key" style="background:var(--red)">F</span>FALSE</div>`}}

// ===== CHECK ANSWERS =====
function chkMCQ(s,c){const os=document.querySelectorAll('.option');os.forEach(e=>e.style.pointerEvents='none');if(s===c){os[s].classList.add('correct');const p=gameState.type==='boss'?20:10;gameState.score+=p;state.totalCorrect++;toast(`+${p} Sahi!`,'success')}else{os[s].classList.add('wrong');if(os[c])os[c].classList.add('correct');gameState.lives--;toast('Galat!','error')}state.totalAttempted++;if(gameState.lives<=0){setTimeout(endGame,1000);return}setTimeout(nextQ,1200)}
function chkTF(s,c){const os=document.querySelectorAll('.option');os.forEach(e=>e.style.pointerEvents='none');if(s===c){os[s?0:1].classList.add('correct');gameState.score+=10;state.totalCorrect++;toast('+10','success')}else{os[s?0:1].classList.add('wrong');os[!s?0:1].classList.add('correct');gameState.lives--;toast('Galat!','error')}state.totalAttempted++;if(gameState.lives<=0){setTimeout(endGame,1000);return}setTimeout(nextQ,1200)}
function chkFB(){const ins=document.querySelectorAll('.blank-input');let ok=true;ins.forEach(i=>{i.value.toLowerCase().trim()===i.dataset.a.toLowerCase().trim()?i.classList.add('correct'):(i.classList.add('wrong'),i.value=i.dataset.a,ok=false)});if(ok){gameState.score+=15;state.totalCorrect++;toast('+15','success')}else{gameState.lives--;toast('Kuch galat','error')}state.totalAttempted++;if(gameState.lives<=0){setTimeout(endGame,1000);return}setTimeout(nextQ,1500)}

function nextQ(){gameState.cur++;gameState.cur>=gameState.total?endGame():render()}

function endGame(){
  if(gameState.timer){clearInterval(gameState.timer);gameState.timer=null}
  const t=TOPICS[currentTopic],p=getTP(t.id),pass=gameState.lives>0;
  state.points+=gameState.score;
  if(pass&&!p.done.includes(currentLevel)){p.done.push(currentLevel);p.done.sort((a,b)=>a-b);
    if(p.done.length===5&&!state.badges.includes(t.id+'-silver')){state.badges.push(t.id+'-silver');toast('🥈 Silver: '+t.name+'!','info')}
    if(p.done.length===10&&!state.badges.includes(t.id+'-gold')){state.badges.push(t.id+'-gold');toast('🥇 Gold: '+t.name+' MASTER!','info')}}
  p.best[currentLevel]=Math.max(p.best[currentLevel]||0,gameState.score);
  state.topicProgress[t.id]=p;saveState();currentView='result';render();
}

function renderResult(){
  const app=document.getElementById('app'),pass=gameState.lives>0,stars=gameState.lives>=3?'⭐⭐⭐':gameState.lives>=2?'⭐⭐':gameState.lives>=1?'⭐':'';
  app.innerHTML+=`<div class="card result"><div style="font-size:42px">${pass?'🎉':'💀'}</div><div class="score" style="color:${pass?'var(--gold)':'var(--red)'}">${gameState.score}</div><div style="font-size:15px;margin-bottom:10px">${pass?'Level Complete!':'Game Over!'}</div><div style="font-size:28px">${stars}</div><br>`+
    (pass?`<button class="btn btn-success btn-full" onclick="currentTopic=${currentTopic};nav('levels')">Next →</button><br><br>`:'')+
    `<button class="btn btn-primary btn-full" onclick="startLevel(${currentLevel})">🔄 Retry</button><br><br><button class="btn btn-purple" onclick="nav('home')">🗺️ Map</button></div>`;
}

// ===== DASHBOARD =====
function renderDash(){
  const app=document.getElementById('app'),acc=state.totalAttempted>0?Math.round(state.totalCorrect/state.totalAttempted*100):0;
  let tl=0;TOPICS.forEach(t=>{tl+=getTP(t.id).done.length});
  app.innerHTML+=`<div class="card"><h2>📊 Progress</h2></div><div class="stat-grid"><div class="stat-card"><div class="val">${state.points}</div><div class="label">Points</div></div><div class="stat-card"><div class="val">${state.streak}</div><div class="label">Streak</div></div><div class="stat-card"><div class="val">${acc}%</div><div class="label">Accuracy</div></div><div class="stat-card"><div class="val">${tl}</div><div class="label">Levels</div></div><div class="stat-card"><div class="val">${state.totalCorrect}</div><div class="label">Correct</div></div><div class="stat-card"><div class="val">${state.badges.length}</div><div class="label">Badges</div></div></div>`;
  if(state.badges.length>0){let h='<div class="card"><h3>🏆 Badges</h3><div class="badge-list">';state.badges.forEach(b=>{const s=b.includes('silver');h+=`<span class="badge-item" style="background:${s?'silver':'var(--gold)'};color:#000">${s?'🥈':'🥇'}${b.replace(/-silver|-gold/,'')}</span>`});h+='</div></div>';app.innerHTML+=h}
  let h='<div class="card"><h3>Topics</h3>';TOPICS.forEach(t=>{const p=getTP(t.id),pct=p.done.length*10;h+=`<div style="margin:6px 0"><div style="display:flex;justify-content:space-between;font-size:12px"><span>${t.icon} ${t.name}</span><span>${pct}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`});h+='</div>';
  h+=`<div class="card"><button class="btn btn-danger btn-full" onclick="if(confirm('Reset ALL?')){localStorage.removeItem('psq');location.reload()}">🗑️ Reset</button></div>`;
  app.innerHTML+=h;
}

// ===== INIT =====
render();
</script></body></html>
